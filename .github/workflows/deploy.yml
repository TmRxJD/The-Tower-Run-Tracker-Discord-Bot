name: Deploy Bot

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [platform-updated]

concurrency:
  group: trackerbot-deploy-${{ github.event_name == 'repository_dispatch' && 'dispatch' || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  deploy:
    runs-on: self-hosted
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    environment: production
    env:
      NODE_AUTH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@tmrxjd'
          always-auth: true

      - name: Resolve deployment metadata
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "repository_dispatch" ]]; then
            echo "PLATFORM_VERSION=${{ github.event.client_payload.version }}" >> "$GITHUB_ENV"
          else
            platformVersion=$(node -p "const pkg=require('./package.json'); pkg.dependencies?.['@tmrxjd/platform'] || pkg.devDependencies?.['@tmrxjd/platform'] || ''")
            echo "PLATFORM_VERSION=$platformVersion" >> "$GITHUB_ENV"
          fi

      - name: Run preflight checks
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
        run: pnpm run deploy:preflight

      - name: Update platform dependency
        if: github.event_name == 'repository_dispatch'
        run: pnpm run deploy:platform:update

      - name: Install dependencies
        run: pnpm run deploy:install

      - name: Validate local runtime env files
        shell: bash
        run: |
          if [[ -n "$TRACKERBOT_ENV_DIR" ]]; then
            if [[ ! -d "$TRACKERBOT_ENV_DIR" ]]; then
              echo "TRACKERBOT_ENV_DIR does not exist: $TRACKERBOT_ENV_DIR" >&2
              exit 1
            fi
            envRoot=$(cd "$TRACKERBOT_ENV_DIR" && pwd)
          else
            envRoot=$(pwd)
          fi

          expected=(
            "$envRoot/.env.prod.local"
            "$envRoot/.env.prod"
            "$envRoot/.env.local"
            "$envRoot/.env"
          )
          found=()
          for candidate in "${expected[@]}"; do
            if [[ -f "$candidate" ]]; then
              found+=("$candidate")
            fi
          done

          if (( ${#found[@]} > 0 )); then
            printf 'Using existing local env files from the runner: %s\n' "$(IFS=', '; echo "${found[*]}")"
            exit 0
          fi

          printf 'No local env file found on the runner. Expected one of: %s\n' "$(IFS=', '; echo "${expected[*]}")" >&2
          exit 1

      - name: Build service
        run: pnpm run deploy:build

      - name: Register slash commands
        run: pnpm run deploy:commands

      - name: Activate bot service
        run: pnpm run deploy:activate

      - name: Commit platform dependency bump
        if: github.event_name == 'repository_dispatch'
        shell: bash
        run: |
          if git diff --quiet -- package.json pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "chore: bump @tmrxjd/platform to ${PLATFORM_VERSION}"
          git push
