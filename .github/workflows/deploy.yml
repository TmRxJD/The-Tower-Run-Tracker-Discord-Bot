name: Deploy Bot

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [platform-updated]

concurrency:
  group: trackerbot-deploy-${{ github.event_name == 'repository_dispatch' && 'dispatch' || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  deploy:
    runs-on: self-hosted
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@tmrxjd'

      - name: Resolve deployment metadata
        shell: pwsh
        run: |
          if ($env:GITHUB_EVENT_NAME -eq 'repository_dispatch') {
            "PLATFORM_VERSION=${{ github.event.client_payload.version }}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            $platformVersion = node -p "const pkg=require('./package.json'); pkg.dependencies?.['@tmrxjd/platform'] || pkg.devDependencies?.['@tmrxjd/platform'] || ''"
            "PLATFORM_VERSION=$platformVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }

      - name: Run preflight checks
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
        run: pnpm run deploy:preflight

      - name: Update platform dependency
        if: github.event_name == 'repository_dispatch'
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: pnpm run deploy:platform:update

      - name: Install dependencies
        env:
          GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: pnpm run deploy:install

      - name: Validate local runtime env files
        shell: pwsh
        run: |
          if ($env:TRACKERBOT_ENV_DIR) {
            if (-not (Test-Path $env:TRACKERBOT_ENV_DIR)) {
              Write-Error "TRACKERBOT_ENV_DIR does not exist: $env:TRACKERBOT_ENV_DIR"
              exit 1
            }
            $envRoot = (Resolve-Path $env:TRACKERBOT_ENV_DIR).Path
          } else {
            $envRoot = (Get-Location).Path
          }

          $expected = @('.env.prod.local', '.env.prod', '.env.local', '.env') | ForEach-Object { Join-Path $envRoot $_ }
          $found = $expected | Where-Object { Test-Path $_ }
          if ($found.Count -gt 0) {
            Write-Host "Using existing local env files from the runner: $($found -join ', ')"
            exit 0
          }

          Write-Error "No local env file found on the runner. Expected one of: $($expected -join ', ')"
          exit 1

      - name: Build service
        run: pnpm run deploy:build

      - name: Register slash commands
        run: pnpm run deploy:commands

      - name: Activate bot service
        run: pnpm run deploy:activate

      - name: Commit platform dependency bump
        if: github.event_name == 'repository_dispatch'
        shell: pwsh
        run: |
          git diff --quiet -- package.json pnpm-lock.yaml
          if ($LASTEXITCODE -eq 0) {
            exit 0
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "chore: bump @tmrxjd/platform to ${PLATFORM_VERSION}"
          git push
